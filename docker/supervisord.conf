[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:fastapi]
command=/app/txguard-api/.venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000
directory=/app/txguard-api
autostart=true
autorestart=true
stdout_logfile=/var/log/fastapi.out.log
stderr_logfile=/var/log/fastapi.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:nextjs]
command=node /app/frontend/server.js
directory=/app/frontend
autostart=true
autorestart=true
stdout_logfile=/var/log/nextjs.out.log
stderr_logfile=/var/log/nextjs.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=HOSTNAME="0.0.0.0",PORT="3000"

[program:celery_worker]
command=/app/txguard-api/.venv/bin/celery -A workers.celery_app worker --loglevel=info --concurrency=2
directory=/app/txguard-api
autostart=true
autorestart=true
stdout_logfile=/var/log/celery.out.log
stderr_logfile=/var/log/celery.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=CELERY_FAKE="1"

[program:nginx]
command=nginx -g "daemon off;" -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.out.log
stderr_logfile=/var/log/nginx.err.log
